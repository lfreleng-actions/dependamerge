version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Chore"
    open-pull-requests-limit: 15
    cooldown:
      default-days: 7
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Chore"
    open-pull-requests-limit: 15
    exclude-paths:
      - "LICENSES/**"
    cooldown:
      default-days: 7
  # Pip entry exists solely to keep the zizmor pin in
  # .github/dependabot/zizmor-requirements.txt up to date; that
  # file is consumed at run-time by .github/workflows/zizmor.yaml
  # via grep, never installed via pip.
  - package-ecosystem: "pip"
    directory: "/.github/dependabot"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Chore"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    # Restrict to direct dependencies. The pin file declares only
    # `zizmor` itself; the workflow never runs `pip install -r` against
    # it (it greps the version and feeds it to `uvx --from`), so there
    # is no lockfile and no place for Dependabot to express transitive
    # updates. Without this filter Dependabot's resolver errors with
    # "can't update vulnerable dependencies without a lockfile" whenever
    # a transitive of zizmor carries a security advisory.
    allow:
      - dependency-type: "direct"
