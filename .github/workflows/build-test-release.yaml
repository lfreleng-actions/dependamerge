# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test/Release'

# yamllint disable-line rule:truthy
on:
  # Trigger on tag push events
  push:
    tags:
      - '**'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    # Temporary fork branch pending python-workflows release
    # yamllint disable-line rule:line-length
    uses: modeseven-lfreleng-actions/python-workflows/.github/workflows/build-test-release.yaml@feat/reusable-python-workflows  # Testing
    secrets:
      pypi_credential: ${{ secrets.PYPI_CREDENTIAL }}
      test_pypi_credential: ${{ secrets.TEST_PYPI_CREDENTIAL }}
