# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - master
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  build-test:
    permissions:
      contents: read
      pull-requests: read
    # Temporary fork branch pending python-workflows release
    # yamllint disable-line rule:line-length
    uses: modeseven-lfreleng-actions/python-workflows/.github/workflows/build-test.yaml@feat/reusable-python-workflows  # Testing
